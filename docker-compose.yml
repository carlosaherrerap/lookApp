services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: androidApp
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lookApp
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  postgres_data:
